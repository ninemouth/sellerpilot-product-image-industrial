workflow_id: xiaohongshu-image-pack
name: Xiaohongshu Image Pack
version: 1.4.0
inherits: ecommerce-product-image-generation
goal: Generate Xiaohongshu content-native cover and seed image packs using GPT built-in image generation prompts plus QA/export gates; create request packs only as fallback or audit evidence.
steps:
  - resolve-skill-root
