  - commerce-design-research-planner-if-conversion-critical
  - audience-persona
  - compact-market-research-if-triggered
  - product-positioning
  - product-feature-analysis
  - audience-positioning-analysis
  - compact-commerce-creative-photo-brief
  - graphic-design-direction
  - image-set-architecture
  - sketch-to-final-production-if-complete-set-or-scene-heavy
  - compact-layout-wireframes-if-needed
  - prompt-readiness-gate
  - visual-template-library
  - visual-strategy
  - visual-director
  - scene-asset-production-if-scene-roles
  - copy-localization
  - copy-strategy-gate
  - localized-copy-qa-gate-if-locale-needs-review
  - text-layout-proof-gate-before-final-raster-if-visible-copy
  - compact-image-set-blueprint
  - gpt-built-in-image-generation-policy
  - prompt-layer-architect
  - prompt-layer-stack
  - prompt-layer-gate
  - personalized-prompt-delivery
  - resolve-platform-ratio-and-provider-generation-spec-before-execution
  - generation-request-pack-if-fallback-or-audit-needed
  - scene-asset-generation-if-scene-roles
  - generation-runtime-execution-boundary
  - generation-execution-controller-anchor-first-bounded-concurrency-after-qa
  - anchor-batch-generation-loop-if-runtime-available
  - anchor-batch-qa-decision-record
  - continue-missing-assets-only
  - identity-consistency-gate
  - identity-geometry-gate-if-proportion-sensitive
  - product-physics-fact-gate-if-function-use-or-scale-sensitive
  - layout-composition
  - text-layout-proof-gate-before-final-export-if-visible-copy
  - localized-final-visible-text-qa-if-locale-needs-review
  - product-background-card-consistency-gate
  - marketing-quality-gate
  - image-set-export-gate
  - generation-progress-reconcile-before-final-delivery
  - runtime-watchdog-before-qa-loop
  - qa-loop-router
  - delivery-overview-contact-sheet-if-multi-image-set
  - post-generation-tldraw-auto-start-if-generated-images
  - final-delivery-gate
  - qa-compliance
  - infinite-canvas-interaction
  - parse-canvas-annotations-if-feedback-provided
  - revision
  - export-packaging
qa_loop_policy:
  use_unified_router_after_gate_failure: true
  rerun_smallest_downstream_scope: true
  stop_on_retry_budget_exhaustion: true
