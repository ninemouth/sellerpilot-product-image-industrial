  - resolve-skill-root
  - input-normalizer
  - brief-intake-gate
  - create-run-skeleton
  - strategy-direction-options-if-request-is-rough
  - strategy-direction-user-handoff-before-formal-production-if-request-is-rough
  - strategy-direction-selection-or-harness-auto-selection
  - goal-contract
  - source-image-set-manifest-if-multiple-images
  - source-image-quality-gate
  - source-image-enhancement-if-needed
  - source-product-understanding-ocr
  - source-product-understanding-gate-if-source-facts-or-visible-text
  - product-image-parser
  - product-identity-lock
  - product-physical-truth-lock-if-function-use-or-scale-sensitive
  - product-url-reader
  - product-fact-sheet
  - platform-spec-profile
  - platform-context-planner
  - platform-category-web-research
  - platform-category-profile-overlay
  - bestseller-design-mining-if-marketing-enhancement
  - audience-persona
  - market-research
  - product-feature-analysis
  - audience-positioning-analysis
  - product-positioning
  - commerce-strategy-brief
  - creative-direction-brief
  - graphic-design-direction
  - commercial-photography-treatment
  - image-set-architecture
  - sketch-to-final-production
  - layout-wireframes
  - prompt-readiness-gate
  - visual-template-library
  - visual-strategy
  - visual-director
  - scene-asset-production-if-scene-roles
  - buyer-facing-copy-director
  - copy-localization
  - copy-strategy-gate
  - image-set-blueprint
  - blueprint-gate
  - gpt-built-in-image-generation-policy
  - prompt-layer-architect
  - prompt-layer-stack
  - prompt-layer-gate
  - personalized-prompt-delivery
  - generation-request-pack-if-fallback-or-audit-needed
  - scene-asset-generation-if-scene-roles
  - generation-runtime-execution-boundary
  - anchor-batch-generation-loop-if-runtime-available
  - continue-missing-assets-only
  - identity-consistency-gate
  - identity-geometry-gate-if-proportion-sensitive
  - product-physics-fact-gate-if-function-use-or-scale-sensitive
  - marketing-diversity-gate
  - marketing-quality-gate
  - image-set-export-gate
  - qa-loop-router
  - delivery-overview-contact-sheet-if-multi-image-set
  - final-delivery-gate
  - qa-compliance
