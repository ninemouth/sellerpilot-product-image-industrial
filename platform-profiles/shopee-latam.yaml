platform_id: shopee_latam
name: Shopee LatAm / Shopee Brazil
aliases: [shopee_brazil, shopee_brasil, shopee_br, shopee_latam]
locale_defaults: [pt-BR, es-419]
source_meta:
  researched_at: "2026-07-05"
  source_confidence: official_shopee_ads_and_open_platform_plus_cross_region_seller_edu
  sources:
    - title: "Melhore a página do seu produto para ter sucesso"
      url: "https://ads.shopee.com.br/learn/faq/111/1462"
      type: official_shopee_brazil_ads_learning
    - title: "Creating product - Developer Guide"
