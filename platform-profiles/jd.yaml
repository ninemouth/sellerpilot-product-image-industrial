visual_strategy:
  default_set:
    - white_background_main_image
    - alternate_angle_image
    - feature_detail_image
    - scale_or_dimension_image
    - scenario_or_use_case_image
    - trust_or_decision_image
    - detail_page_modules
  tone: quality_trust_conversion_clear
  text_density: medium
  language: zh-CN
technical_baseline:
  main_image_aspect_ratio: "1:1 square baseline; some categories/support surfaces may allow long image"
  baseline_size: "800x800px is a common merchant-learning baseline; public JD merchant snippets also mention relaxed image-space ranges such as 480-1500px square with file-size limits. Verify per category."
  file_types: [jpg, jpeg, png]
  first_image: "front physical product image; white background expected for baseline commodity surfaces"
image_guidance:
  - keep first image clean, product-dominant, and physically accurate
  - provide multiple angles such as front, side, back, and detail when the category benefits from them
  - use secondary images for dimensions, material/detail evidence, and usage scenarios
  - keep Chinese selling points concise and avoid dense small text
  - use run-level platform/category overlay for current category dimensions and merchant-backend prompts
marketing_guidance:
  - emphasize trust, quality, specifications, service, and clear comparison-friendly decision information
  - use evidence-backed JD-style value points rather than noisy promotion claims
risk_notes:
  - avoid false discounts, false ranking, official/authorized claims without evidence, certification claims without proof, and third-party watermarks
  - do not use model/lifestyle scenes on first image when the current category rule requires a white-background product image
  - verify current category-specific image rules through JD merchant backend or official learning center before final export
research_policy:
  yaml_is_baseline: true
  require_run_level_overlay: true
  promote_only_official_or_repeated_findings: true
