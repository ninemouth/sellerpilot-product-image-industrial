skill_id: image-generation
name: GPT Built-In Image Generation Execution
version: 1.3.0
layer: L2 Commerce Visual
owner: sellerpilot-visual-core
business_goal: Prepare personalized GPT built-in image generation prompts, execute through Codex-native imagegen/image_gen when available, and create request packs only as fallback or audit evidence.
inputs:
  required: [task_context]
  optional: [source_images, product_url, product_fact_sheet, product_identity_lock, platform_profile, audience_persona, image_set_blueprint, localized_copy_pack, generated_images, user_annotations]
outputs:
  - structured_result
  - evidence_refs
  - risk_flags
  - final_personalized_generation_prompts
  - generation_request_pack_if_fallback_or_audit_needed
  - execution_boundary_note
risk_boundary:
  - preserve_product_truth
  - distinguish_observed_facts_from_ai_inference
  - use_codex_native_imagegen_image_gen_when_available
  - do_not_create_ad_hoc_generation_wrappers
  - do_not_use_silent_cli_or_api_fallback
telemetry:
  - success_rate
  - revision_rate
